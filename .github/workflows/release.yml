name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  MISE_LOCKED: "1"

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: macos-15
    permissions:
      attestations: write # Required for actions/attest to create artifact attestations.
      contents: write # Required for GoReleaser to create GitHub releases and upload release assets.
      id-token: write # Required for actions/attest Sigstore signing.
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.1
          install: true
          install_args: --locked go goreleaser
          cache: false

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
