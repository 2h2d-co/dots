name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_LOCKED: "1"

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.1
          install: true
          install_args: --locked go
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Integration test
        run: go test -v -count=1 -tags=integration ./integration

      - name: Build
        run: go build ./...

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.1
          install: true
          install_args: --locked go golangci-lint actionlint zizmor
          cache: true

      - name: Go lint
        run: golangci-lint run

      - name: GitHub Actions syntax lint
        run: actionlint

      - name: GitHub Actions security lint
        run: zizmor --pedantic --no-ignores .github/workflows
